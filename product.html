<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="page-title">Produit — DreamMarket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="animations.css">
  <link rel="icon" type="image/svg+xml" href="assets/img/logo.svg">
</head>
<body>

  <div class="loader"><div class="loader-sun"></div></div>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand"><img src="assets/img/logo.svg" alt="Citro" width="36" height="36"> DreamMarket</a>
      <nav class="nav-links">
        <a href="index.html" data-page="index.html">Accueil</a>
        <a href="shop.html" data-page="shop.html">Boutique</a>
        <a href="contact.html" data-page="contact.html">Contact</a>
      </nav>
      <div class="header-actions">
        <button class="theme-switch" aria-label="Changer de thème"><span class="knob"></span></button>
        <button class="icon-btn" data-cart-open aria-label="Ouvrir le panier">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293A1 1 0 0 0 5.414 17H17M17 17a2 2 0 1 0 0 4 2 2 0 0 0 0-4ZM9 21a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/></svg>
          <span class="cart-count">0</span>
        </button>
        <button class="burger" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <main>
    <section id="product-root" style="padding-bottom:0;">
      <div class="container">
        <!-- filled by JS -->
      </div>
    </section>

    <section id="related-section">
      <div class="container">
        <div class="section-head">
          <span class="eyebrow">Vous aimerez aussi</span>
          <h2>Produits similaires</h2>
        </div>
        <div class="grid grid-3" id="related-grid"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-grid">
        <a href="index.html" class="brand"><img src="assets/img/logo.svg" alt="Citro" width="36" height="36"> DreamMarket</a>
        <nav class="footer-links">
          <a href="index.html">Accueil</a>
          <a href="shop.html">Boutique</a>
          <a href="contact.html">Contact</a>
          <a href="mentions-legales.html">Mentions légales</a>
        </nav>
      </div>
      <div class="footer-bottom">© 2026 DreamMarket Tous droits réservés.</div>
    </div>
  </footer>

  <button class="back-to-top" aria-label="Retour en haut">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
  </button>

  <script src="products.js"></script>
  <script src="app.js"></script>
  <script src="cart.js"></script>
  <script>
    const id = new URLSearchParams(location.search).get("id");
    const product = getProductById(id);
    const root = document.querySelector("#product-root .container");
    const relatedSection = document.querySelector("#related-section");
    const relatedGrid = document.querySelector("#related-grid");

    if (!product) {
      root.innerHTML = `
        <div class="empty-state" style="padding-top:calc(var(--header-h) + var(--space-lg));">
          <h1>Produit introuvable</h1>
          <p class="desc">Ce produit n'existe pas ou n'est plus disponible.</p>
          <a href="shop.html" class="btn btn-primary mt-lg">Retour à la boutique</a>
        </div>`;
      relatedSection.style.display = "none";
    } else {
      document.title = `${product.name} — Citro`;

      const oldPrice = product.oldPrice
        ? `<span class="price-old">${product.oldPrice.toFixed(2)}€</span>`
        : "";

      root.innerHTML = `
        <div class="product-view">
          <div class="product-gallery">
            <img src="${product.image}" alt="${product.name}" style="width:100%;height:100%;object-fit:cover;">
          </div>
          <div class="product-info">
            ${product.badge ? `<span class="badge best" style="position:static;display:inline-block;margin-bottom:var(--space-xs);">${product.badge}</span>` : ""}
            <h1>${product.name}</h1>
            <div class="stars" style="margin:8px 0;">${renderStars(product.rating)} <span style="color:var(--c-text-soft);font-size:0.9rem;">(${product.reviews} avis)</span></div>
            <div class="price-row" style="margin:var(--space-xs) 0 var(--space-sm);">
              <span class="price" style="font-size:1.8rem;">${product.price.toFixed(2)}€</span>
              ${oldPrice}
            </div>
            <p class="desc">${product.fullDescription}</p>
            <div style="display:flex;align-items:center;gap:var(--space-sm);margin:var(--space-md) 0;">
              <div class="qty-stepper">
                <button id="qty-minus">−</button>
                <span id="qty-value">1</span>
                <button id="qty-plus">+</button>
              </div>
              <button class="btn btn-primary" id="add-to-cart-btn">Ajouter au panier</button>
              <button class="icon-btn wish-btn-page ${isInWishlist(product.id) ? "active" : ""}" data-wish="${product.id}" aria-label="Ajouter à la wishlist" style="position:static;">
                <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.35-9.5-8.5C.5 8.5 2.5 5 6 5c2 0 3.5 1.2 4 2.5C10.5 6.2 12 5 14 5c3.5 0 5.5 3.5 3.5 7.5C19 16.65 12 21 12 21z"/></svg>
              </button>
            </div>
            <div class="trust-strip" style="justify-content:flex-start;">
              <span>⚡ Livraison instantanée</span>
              <span>🔒 Paiement sécurisé</span>
            </div>

            <div class="tabs">
              <button class="tab-btn active" data-tab="desc">Description</button>
              <button class="tab-btn" data-tab="reviews">Avis (${product.reviews})</button>
            </div>
            <div class="tab-panel active" data-panel="desc">
              <div class="text-block"><p class="desc">${product.fullDescription}</p></div>
            </div>
            <div class="tab-panel" data-panel="reviews">
              <div class="review">
                <div class="avatar-circle">L</div>
                <div>
                  <strong>Léa M.</strong>
                  <div class="stars">★★★★★</div>
                  <p class="desc">Livraison ultra rapide, exactement comme décrit. Je recommande !</p>
                </div>
              </div>
              <div class="review">
                <div class="avatar-circle">T</div>
                <div>
                  <strong>Thomas B.</strong>
                  <div class="stars">★★★★☆</div>
                  <p class="desc">Très satisfait, support réactif en cas de question.</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;

      // wishlist button on product page
      root.querySelector("[data-wish]").addEventListener("click", (e) => {
        const active = toggleWishlist(product.id);
        e.currentTarget.classList.toggle("active", active);
      });

      // quantity stepper
      let qty = 1;
      const qtyValue = root.querySelector("#qty-value");
      root.querySelector("#qty-minus").addEventListener("click", () => {
        qty = Math.max(1, qty - 1);
        qtyValue.textContent = qty;
      });
      root.querySelector("#qty-plus").addEventListener("click", () => {
        qty += 1;
        qtyValue.textContent = qty;
      });
      root.querySelector("#add-to-cart-btn").addEventListener("click", () => {
        addToCart(product.id, qty);
      });

      // tabs
      root.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          root.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
          root.querySelectorAll(".tab-panel").forEach((p) => p.classList.remove("active"));
          btn.classList.add("active");
          root.querySelector(`[data-panel="${btn.dataset.tab}"]`).classList.add("active");
        });
      });

      // related products
      const related = getRelatedProducts(product);
      if (related.length) {
        relatedGrid.innerHTML = related.map((p, i) => productCardHTML(p, i)).join("");
        observeReveal(relatedGrid);
      } else {
        relatedSection.style.display = "none";
      }
    }
  </script>
</body>
</html>
